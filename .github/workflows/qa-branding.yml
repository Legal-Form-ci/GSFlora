name: QA Branding

on:
  push:
    branches: [main]
  pull_request:

jobs:
  branding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run branding checklist
        run: node scripts/qa-branding.mjs